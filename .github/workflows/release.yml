# Publishes to npm when you push a version tag (e.g. v0.1.0).
# One-time setup: create an npm "Automation" token at npmjs.com → Access Tokens,
# then add it as a repo secret named NPM_TOKEN (GitHub → Settings → Secrets → Actions).
# Release flow: npm version patch && git push --follow-tags
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
