# Publishes to npm when you push a version tag (e.g. v0.1.0).
# One-time setup: create an npm token (2FA-bypass) at npmjs.com → Access Tokens,
# then add it as the NPM_TOKEN secret under the "Production" environment
# (GitHub → Settings → Environments → Production → Environment secrets).
# Release flow: npm version minor && git push --follow-tags
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production # NPM_TOKEN lives in this environment's secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
